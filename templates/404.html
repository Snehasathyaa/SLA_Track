{% extends 'base.html' %}{% block title %}404 — SmartSLA Kerala{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 140px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem">
  <div style="text-align:center" class="a1">
    <div style="font-size:4rem;font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.06em;line-height:1">404</div>
    <h1 style="font-size:1.2rem;font-weight:700;color:var(--g800);margin:.5rem 0 .3rem">Page not found</h1>
    <p style="font-size:.82rem;color:var(--g500);margin-bottom:1.25rem">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
      <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="bi bi-house"></i>Home</a>
      <a href="{{ url_for('track') }}" class="btn btn-outline"><i class="bi bi-search"></i>Track Complaint</a>
    </div>
  </div>
</div>
{% endblock %}
